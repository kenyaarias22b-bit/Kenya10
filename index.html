<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Básica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Destellos - Sparkles */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.8);
            animation: twinkle 1.5s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* Mariposas */
        .butterfly {
            position: absolute;
            width: 40px;
            height: 40px;
            pointer-events: none;
            animation: flutterAnimation 6s ease-in-out infinite;
        }

        .butterfly-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6));
        }

        @keyframes flutterAnimation {
            0% { transform: translateY(0px) translateX(0px) rotate(0deg); opacity: 1; }
            25% { transform: translateY(-30px) translateX(20px) rotate(-15deg); }
            50% { transform: translateY(-60px) translateX(-10px) rotate(0deg); }
            75% { transform: translateY(-30px) translateX(-30px) rotate(15deg); }
            100% { transform: translateY(0px) translateX(0px) rotate(0deg); opacity: 1; }
        }

        .butterfly:nth-child(1) { animation-delay: 0s; left: 10%; top: 20%; animation-duration: 7s; }
        .butterfly:nth-child(2) { animation-delay: 1s; left: 80%; top: 30%; animation-duration: 8s; }
        .butterfly:nth-child(3) { animation-delay: 2s; left: 50%; top: 50%; animation-duration: 6.5s; }
        .butterfly:nth-child(4) { animation-delay: 3s; left: 20%; top: 70%; animation-duration: 7.5s; }
        .butterfly:nth-child(5) { animation-delay: 1.5s; left: 85%; top: 60%; animation-duration: 8.5s; }
        .butterfly:nth-child(6) { animation-delay: 2.5s; left: 15%; top: 40%; animation-duration: 7s; }

        .calculadora {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 320px;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h2 {
            margin-top: 0;
            color: #333;
            font-size: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            text-align: center;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.3);
        }

        .botones {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 15px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
            background: linear-gradient(135deg, #764ba2, #667eea);
        }

        button:active {
            transform: translateY(0px);
        }

        .btn-borrar {
            grid-column: span 4;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3);
        }

        .btn-borrar:hover {
            background: linear-gradient(135deg, #f5576c, #f093fb);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.5);
        }

        .resultado-container {
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(240, 147, 251, 0.1));
            border-radius: 6px;
            font-size: 20px;
            font-weight: bold;
            color: #333;
            border: 2px solid rgba(102, 126, 234, 0.2);
        }
    </style>
</head>
<body>

    <div class="calculadora">
        <h2>Calculadora</h2>
        
        <input type="number" id="num1" placeholder="Ingresa el primer número">
        <input type="number" id="num2" placeholder="Ingresa el segundo número">

        <div class="botones">
            <button onclick="calcular('+')">+</button>
            <button onclick="calcular('-')">-</button>
            <button onclick="calcular('*')">×</button>
            <button onclick="calcular('/')">÷</button>
            
            <button onclick="borrar()" class="btn-borrar">Borrar / Limpiar</button>
        </div>

        <div class="resultado-container">
            Resultado: <span id="resultado">0</span>
        </div>
    </div>

    <script>
        // Crear destellos (sparkles) animados
        function createSparkles() {
            const sparkleCount = 50;
            for (let i = 0; i < sparkleCount; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.top = Math.random() * 100 + '%';
                sparkle.style.animationDelay = Math.random() * 1.5 + 's';
                sparkle.style.animationDuration = (Math.random() * 1 + 1.5) + 's';
                document.body.appendChild(sparkle);
            }
        }

        // Crear mariposas animadas
        function createButterflies() {
            const butterflyCount = 6;
            const container = document.body;
            
            for (let i = 0; i < butterflyCount; i++) {
                const butterfly = document.createElement('div');
                butterfly.className = 'butterfly';
                
                // SVG de mariposa
                const colors = ['#FF69B4', '#FFB6D9', '#FF1493', '#FF69B4', '#FFB6D9', '#FF00FF'];
                const svg = `
                    <svg viewBox="0 0 100 100" class="butterfly-svg">
                        <!-- Ala izquierda superior -->
                        <ellipse cx="35" cy="25" rx="18" ry="22" fill="${colors[i]}" opacity="0.8"/>
                        <!-- Ala izquierda inferior -->
                        <ellipse cx="30" cy="55" rx="15" ry="18" fill="${colors[i]}" opacity="0.9"/>
                        <!-- Ala derecha superior -->
                        <ellipse cx="65" cy="25" rx="18" ry="22" fill="${colors[i]}" opacity="0.8"/>
                        <!-- Ala derecha inferior -->
                        <ellipse cx="70" cy="55" rx="15" ry="18" fill="${colors[i]}" opacity="0.9"/>
                        <!-- Cuerpo -->
                        <ellipse cx="50" cy="50" rx="6" ry="15" fill="#333"/>
                        <!-- Antenas -->
                        <line x1="50" y1="35" x2="48" y2="20" stroke="#333" stroke-width="1.5"/>
                        <line x1="50" y1="35" x2="52" y2="20" stroke="#333" stroke-width="1.5"/>
                        <!-- Detalles en las alas -->
                        <circle cx="35" cy="30" r="3" fill="rgba(255,255,255,0.5)"/>
                        <circle cx="65" cy="30" r="3" fill="rgba(255,255,255,0.5)"/>
                    </svg>
                `;
                butterfly.innerHTML = svg;
                container.appendChild(butterfly);
            }
        }

        // Función principal para hacer los cálculos
        function calcular(operacion) {
            let num1 = parseFloat(document.getElementById('num1').value);
            let num2 = parseFloat(document.getElementById('num2').value);
            let spanResultado = document.getElementById('resultado');

            if (isNaN(num1) || isNaN(num2)) {
                spanResultado.innerText = "Error: Faltan números";
                return;
            }

            let resultadoFinal;

            switch (operacion) {
                case '+':
                    resultadoFinal = num1 + num2;
                    break;
                case '-':
                    resultadoFinal = num1 - num2;
                    break;
                case '*':
                    resultadoFinal = num1 * num2;
                    break;
                case '/':
                    if (num2 === 0) {
                        spanResultado.innerText = "No se puede dividir por 0";
                        return;
                    }
                    resultadoFinal = num1 / num2;
                    break;
            }

            spanResultado.innerText = resultadoFinal;
        }

        // Función para limpiar los campos
        function borrar() {
            document.getElementById('num1').value = '';
            document.getElementById('num2').value = '';
            document.getElementById('resultado').innerText = '0';
        }

        // Inicializar cuando el página carga
        window.addEventListener('load', function() {
            createSparkles();
            createButterflies();
        });
    </script>

</body>
</html>
